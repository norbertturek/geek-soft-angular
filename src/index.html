<!doctype html>
<html lang="en">
<head>
  <script>
    (function() {
      try {
        var k = 'geek-soft-theme';
        var s = localStorage.getItem(k);
        var dark = s === 'dark' || ((s === 'system' || !s) && typeof window.matchMedia === 'function' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
      } catch (_) {}
    })();
  </script>
  <meta charset="utf-8">
  <title>GeekSoftAngular</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>
